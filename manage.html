<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage Services</title>
  <link rel="icon" href="assets/logo.jpg" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <h2>Manage Services</h2>
    <div class="mb-3 text-end">
      <button class="btn btn-outline-secondary" id="logoutAdmin">Logout</button>
    </div>
    <div id="adminContent">
      <h5>Room Types</h5>
      <button class="btn btn-primary mb-3" onclick="addRoomType()">Add Room Type</button>
      <div class="table-responsive">
        <table class="table table-striped" id="roomsTable">
          <thead>
            <tr><th>Name</th><th>Price</th><th>Description</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const user = JSON.parse(localStorage.getItem('user')) || null;
    if (!user || user.role !== 'admin') {
      alert('Admin access required.');
      window.location.href = 'main.html';
      return;
    }

    function render() {
      const rooms = JSON.parse(localStorage.getItem('rooms')) || [
        { name: 'Superior', price: 50, description: 'Basic room' },
        { name: 'Deluxe', price: 55, description: 'Comfortable room' },
        { name: 'Deluxe Double', price: 150, description: 'Spacious double room' }
      ];
      const tbody = document.querySelector('#roomsTable tbody');
      tbody.innerHTML = '';
      rooms.forEach((room, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${room.name}</td><td>$${room.price}</td><td>${room.description}</td><td>
          <button class="btn btn-sm btn-warning" onclick="editRoom(${index})">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRoom(${index})">Delete</button>
        </td>`;
        tbody.appendChild(tr);
      });
      localStorage.setItem('rooms', JSON.stringify(rooms));
    }

    document.getElementById('logoutAdmin').addEventListener('click', ()=>{ localStorage.removeItem('user'); window.location.href='main.html'; });

    render();
  })();

  function addRoomType() {
    let name = prompt('Room name:');
    let price = prompt('Price per night:');
    let description = prompt('Description:');
    if (name && price && description) {
      let rooms = JSON.parse(localStorage.getItem('rooms')) || [];
      rooms.push({ name, price: parseFloat(price), description });
      localStorage.setItem('rooms', JSON.stringify(rooms));
      location.reload();
    }
  }

  function editRoom(index) {
    let rooms = JSON.parse(localStorage.getItem('rooms')) || [];
    let room = rooms[index];
    let name = prompt('Room name:', room.name);
    let price = prompt('Price per night:', room.price);
    let description = prompt('Description:', room.description);
    if (name && price && description) {
      rooms[index] = { name, price: parseFloat(price), description };
      localStorage.setItem('rooms', JSON.stringify(rooms));
      location.reload();
    }
  }

  function deleteRoom(index) {
    if (confirm('Delete this room type?')) {
      let rooms = JSON.parse(localStorage.getItem('rooms')) || [];
      rooms.splice(index, 1);
      localStorage.setItem('rooms', JSON.stringify(rooms));
      location.reload();
    }
  }
  </script>
</body>
</html>
